<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
<!-- Background -->
<rect width="32" height="32" fill="#0a0a2e"/>

<!-- Body -->
<rect x="12" y="4" width="8" height="4" fill="#f4d03f"/>
<rect x="10" y="6" width="12" height="4" fill="#f4d03f"/>
<rect x="8" y="8" width="16" height="4" fill="#f4d03f"/>
<rect x="8" y="10" width="16" height="4" fill="#f4d03f"/>
<rect x="8" y="12" width="16" height="4" fill="#f4d03f"/>
<rect x="10" y="14" width="12" height="2" fill="#f4d03f"/>
<rect x="10" y="16" width="12" height="2" fill="#f4d03f"/>
<rect x="12" y="18" width="8" height="2" fill="#f4d03f"/>
<rect x="14" y="20" width="4" height="2" fill="#f4d03f"/>

<!-- Ears -->
<rect x="8" y="6" width="2" height="4" fill="#d4ac0d"/>
<rect x="22" y="6" width="2" height="4" fill="#d4ac0d"/>
<rect x="6" y="8" width="2" height="4" fill="#d4ac0d"/>
<rect x="24" y="8" width="2" height="4" fill="#d4ac0d"/>

<!-- Eyes -->
<rect x="11" y="10" width="2" height="2" fill="#2c3e50"/>
<rect x="19" y="10" width="2" height="2" fill="#2c3e50"/>
<rect x="11" y="10" width="1" height="1" fill="#ffffff"/>
<rect x="19" y="10" width="1" height="1" fill="#ffffff"/>

<!-- Nose -->
<rect x="15" y="13" width="2" height="1" fill="#e67e22"/>

<!-- Mouth -->
<rect x="14" y="15" width="1" height="1" fill="#e67e22"/>
<rect x="17" y="15" width="1" height="1" fill="#e67e22"/>
<rect x="15" y="16" width="2" height="1" fill="#e67e22"/>

<!-- Cheeks -->
<rect x="9" y="12" width="2" height="1" fill="#f5b7b1"/>
<rect x="21" y="12" width="2" height="1" fill="#f5b7b1"/>

<!-- Paws -->
<rect x="10" y="20" width="2" height="2" fill="#f4d03f"/>
<rect x="20" y="20" width="2" height="2" fill="#f4d03f"/>
<rect x="10" y="22" width="2" height="1" fill="#d4ac0d"/>
<rect x="20" y="22" width="2" height="1" fill="#d4ac0d"/>

<!-- Tail -->
<rect x="24" y="16" width="2" height="2" fill="#f4d03f"/>
<rect x="26" y="14" width="2" height="2" fill="#f4d03f"/>
<rect x="28" y="12" width="2" height="2" fill="#f4d03f"/>
</svg>